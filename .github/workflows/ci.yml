name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:battery
      - run: npm run test:golden
      # P1 gates: the artifact assembled from src/game/ parts must be AST-equivalent to
      # the frozen monolith and behave identically under the full battery + golden oracle.
      - name: AST equivalence (dist vs frozen monolith)
        run: node scripts/ast-equal.mjs
      - name: Battery vs rebuilt artifact
        run: ELDERMYR_GAME_FILE=$PWD/dist/eldermyr.html node tests/run-battery.mjs
      - name: Golden vs rebuilt artifact
        run: ELDERMYR_GAME_FILE=$PWD/dist/eldermyr.html node tests/golden/harness.mjs check
