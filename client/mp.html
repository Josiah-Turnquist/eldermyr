<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Realms of Eldermyr — Multiplayer</title>
<style>
  #newgame-btn{display:none !important;}  /* no "new game" in a shared world; the status readout takes its spot */
  #mp-status{position:fixed;left:50%;transform:translateX(-50%);top:10px;z-index:99999;font:11px ui-monospace,Menlo,monospace;color:#9098a8;background:rgba(20,20,30,0.85);border:1px solid #5a5040;padding:4px 10px;border-radius:4px;text-shadow:1px 1px 0 #000;pointer-events:none}
  #mp-hurt{position:fixed;inset:0;z-index:99998;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center, transparent 42%, rgba(175,0,0,0.55) 100%)}
  /* --- account / identity UI --- */
  #mp-account{position:fixed;left:10px;top:236px;z-index:99999;font:11px ui-monospace,Menlo,monospace;color:#e8d9a8;background:rgba(20,20,30,0.85);border:1px solid #5a5040;padding:4px 9px;border-radius:4px;cursor:pointer;text-shadow:1px 1px 0 #000;display:none;user-select:none;white-space:nowrap}
  #mp-account:hover{border-color:#c9a54e;color:#fff}
  .mp-modal{position:fixed;inset:0;z-index:100000;display:none;align-items:center;justify-content:center;background:rgba(6,6,10,0.72)}
  .mp-modal.on{display:flex}
  .mp-card{width:min(92vw,384px);max-height:88vh;overflow:auto;background:linear-gradient(#20202c,#171720);border:1px solid #5a5040;border-radius:8px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.6);font-family:ui-monospace,Menlo,monospace;color:#cdd2dc}
  .mp-card h2{margin:0 0 6px;font-size:17px;color:#e8d9a8;letter-spacing:0.5px}
  .mp-card p{margin:0 0 13px;font-size:12px;line-height:1.5;color:#9098a8}
  .mp-card input{width:100%;box-sizing:border-box;background:#0e0e16;border:1px solid #4a4438;color:#fff;font:14px ui-monospace,Menlo,monospace;padding:9px 10px;border-radius:4px;margin-bottom:10px;outline:none}
  .mp-card input:focus{border-color:#c9a54e}
  .mp-card input:disabled{color:#8a8f9a}
  .mp-btn{display:block;width:100%;box-sizing:border-box;background:#2b2b38;border:1px solid #5a5040;color:#e8d9a8;font:13px ui-monospace,Menlo,monospace;padding:9px 12px;border-radius:4px;cursor:pointer;text-align:center;margin-top:7px}
  .mp-btn:hover{border-color:#c9a54e;background:#34343f;color:#fff}
  .mp-btn.primary{background:#3a5a3a;border-color:#5c8c5c;color:#eaffea}
  .mp-btn.primary:hover{background:#456945}
  .mp-btn.danger:hover{border-color:#b05050;color:#ffb0b0}
  .mp-code{font-size:19px;letter-spacing:2px;color:#ffe08a;background:#0e0e16;border:1px dashed #6a5f3a;border-radius:5px;padding:12px;text-align:center;margin-bottom:6px;word-break:break-all}
  .mp-row{display:flex;gap:8px}
  .mp-row .mp-btn{margin-top:0}
  .mp-warn{font-size:11px;color:#e0a860;background:rgba(120,80,20,0.18);border:1px solid #6a5228;border-radius:4px;padding:7px 9px;margin-bottom:12px;line-height:1.45}
  .mp-mut{font-size:11px;color:#6b7080;margin-top:12px;text-align:center}
  /* --- chat --- */
  /* the game's #log occupies bottom:12px + up to ~134px tall — keep chat ABOVE it */
  #mp-chat{position:fixed;left:10px;bottom:188px;z-index:99990;width:min(46vw,360px);display:flex;flex-direction:column;gap:3px;pointer-events:none;font:12px ui-monospace,Menlo,monospace}
  .mp-chat-line{align-self:flex-start;max-width:100%;background:rgba(16,16,24,0.72);border-left:2px solid #5a5040;padding:2px 8px;border-radius:0 4px 4px 0;color:#d3d8e2;text-shadow:1px 1px 0 #000;word-break:break-word;transition:opacity .8s ease}
  .mp-chat-line b{color:#9fe0ff;font-weight:600}
  #mp-chat-input{position:fixed;left:10px;bottom:154px;z-index:99991;width:min(46vw,360px);box-sizing:border-box;display:none;background:#0e0e16;border:1px solid #c9a54e;color:#fff;font:13px ui-monospace,Menlo,monospace;padding:6px 9px;border-radius:4px;outline:none;text-shadow:1px 1px 0 #000}
  #mp-chat-input.on{display:block}
</style>
</head>
<body>
<div id="mp-hurt"></div>
<div id="mp-account"></div>
<div id="mp-status">loading Eldermyr…</div>
<div id="mp-chat"></div>
<input id="mp-chat-input" maxlength="200" autocomplete="off" spellcheck="false" placeholder="say something… (Enter to send, Esc to cancel)">

<script>
/* =============================================================================
 * Multiplayer client — the "load-and-render" fork.
 * Fetches the UNMODIFIED game artifact from the server (route '/eldermyr-rpg.html',
 * which serves the built dist/eldermyr.html since the P1 wrap), boots it so all
 * its sprite/HUD/audio machinery initializes, stubs its simulation loop, then
 * drives its REAL renderer with authoritative snapshots from the server.
 * Nothing about the game file is copied or modified.
 * ========================================================================== */
const MP_PORT = 8138;
// The node server serves this page AND the ws on ONE port → same-origin works everywhere
// (prod wss, local node on any port — incl. auto-assigned dev ports). The only exception:
// the python single-player dev server (8137) serving this page — target the node port then.
const WS_URL = (location.port === String(8137))
  ? 'ws://localhost:' + MP_PORT
  : (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host;
const st = (t) => { const e = document.getElementById('mp-status'); if (e) e.textContent = t; };

(async function boot() {
  // 1. fetch the untouched game
  let html;
  try { html = await (await fetch('/eldermyr-rpg.html')).text(); }
  catch (e) { st('failed to fetch game: ' + e); return; }
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // 2. adopt its <style>s and its <body> DOM (canvas + all HUD/overlay elements)
  for (const styleEl of doc.querySelectorAll('style')) document.head.appendChild(styleEl.cloneNode(true));
  const body = doc.body.cloneNode(true);
  const gameScriptEl = body.querySelector('script');
  const gameCode = gameScriptEl ? gameScriptEl.textContent : '';
  if (gameScriptEl) gameScriptEl.remove();               // don't let innerHTML carry an inert copy
  const frag = document.createDocumentFragment();
  while (body.firstChild) frag.appendChild(body.firstChild);
  document.body.insertBefore(frag, document.body.firstChild);

  // 3. keep the game from grabbing the keyboard (we route input to the server)
  //    and from ever running its own sim loop (stub rAF so its loop() can't recur).
  const realWinAdd = window.addEventListener.bind(window);
  window.addEventListener = (type, fn, opts) => { if (type === 'keydown' || type === 'keyup') return; return realWinAdd(type, fn, opts); };
  const realRAF = window.requestAnimationFrame.bind(window);
  window.requestAnimationFrame = () => 0;                // stays stubbed for the game forever

  // 4. run the game code + capture the symbols we need to render
  const NAMES = ['state', 'keys', 'maps', 'TILE', 'OW_W', 'OW_H', 'VIEW_W', 'VIEW_H', 'T', 'ctx', 'canvas',
    'fitCanvas', 'startGame', 'renderWorld', 'updateCamera', 'applyShake', 'drawWayfinder', 'updateMinimap',
    'updateHubTabs', 'updateCombatHud', 'updateHUD', 'buildMinimapBase', 'drawPlayer', 'Sound', 'canMoveTo', 'flyCanMove', 'canSailTo',
    'floatDamage', 'spawnBurst', 'addShake', 'updateParticles', 'log', 'currentObjective', 'rarityName', 'isWinter', 'updateQuests', 'elemRgb', 'ultimateNova', 'renderLegion'];   // 'renderLegion' → re-paint the [N] Dread Legion panel when the SERVER's roster lands/changes while it's open (a "???" strength/weakness reveal resolves mid-fight); the panel is drawn once on open, so without this it would sit stale   // 'ultimateNova' → the [Z] Ultimate's explosive element-colored nova; the client REPLAYS it (the ult runs server-side headlessly, so without this replay a mage's Z showed nothing)   // flyCanMove/canSailTo → predict mount/boat collision like the server (else sailing rubber-bands off water)   // 'log' was MISSING → every G.log(...) silently no-op'd, so the event feed + all client log lines never showed (#2); 'currentObjective' was likewise missing → the gold travel diamond + minimap pulse never rendered in MP (#1); 'elemRgb' → element→"r,g,b" so drawOthers can paint a teammate's HEAT-aura glow with the SAME rgba the self-pulsate uses
  const code = gameCode + '\n;window.__G={};' + NAMES.map((n) => `try{window.__G[${JSON.stringify(n)}]=${n}}catch(e){}`).join(';');
  const s = document.createElement('script'); s.textContent = code; document.body.appendChild(s);
  // Dual-path (P1d): the rebuilt artifact (dist/eldermyr.html) ends by defining
  // window.Eldermyr — the EXPLICIT, build-verified namespace of every CAPTURE/NAMES symbol
  // (generated by scripts/build.mjs; a NAMES entry with no binding FAILS the build). Prefer
  // it when present; the frozen monolith defines no namespace and uses the __G capture above.
  const G = window.Eldermyr || window.__G;
  // Dual-path (P1c): on the rebuilt artifact every rebindable module-level let (VIEW_W/VIEW_H,
  // …) lives as a slot on the globals holder `window.__g`, not as a lexical binding — the
  // try-capture above resolves those names undefined. If we are NOT on the namespace path,
  // re-route exactly those through LIVE accessors onto the holder (so later rebinds, e.g.
  // fitCanvas resizes, stay visible). The monolith path (no window.__g) is untouched.
  if (window.__g) for (const n of NAMES) {
    if (G[n] === undefined && (n in window.__g)) {
      ((k) => Object.defineProperty(G, k, { get: () => window.__g[k], set: (v) => { window.__g[k] = v; }, configurable: true, enumerable: true }))(n);
    }
  }
  // capture audit: surface any NAMES entry that resolved to undefined — the silent-capture failure
  // class that hid 'log' for weeks and 'currentObjective' this release. Warn (don't throw): a few
  // absences can be legitimate, but a missing symbol should never again fail silently.
  { const _missing = G ? NAMES.filter((n) => G[n] === undefined) : NAMES.slice(); if (_missing.length) console.warn('[mp] NAMES symbols that captured undefined:', _missing.join(', ')); }
  if (!G || !G.startGame) { st('game failed to load (no startGame)'); return; }

  // 5. boot the render machinery (builds a valid state, sprites, camera, HUD)
  window.addEventListener = realWinAdd;                  // restore for our own listeners
  // The Dread Legion roster is SHARED WORLD STATE the server owns — the client must never generate its own.
  // genLegion() BAKES each member's level from partyLvl() at generation time, and startGame() (just below) runs
  // it while this hero is still the level-1 DEFAULT — the first snapshot hasn't applied our real level yet — so
  // every member froze at "Lv 1" FOREVER, no matter the hero's level. Worse, that roster was a PHANTOM (its own
  // RNG names) that never saw the encounters the server records, so the nemesis "wound it to learn" ??? reveals
  // could never resolve. Stubbing the GLOBAL kills both fabrication paths at once: the game is one classic
  // <script> with top-level `function genLegion(){}`, so window.genLegion IS the binding that startGame() and
  // openLegion()'s `if(!state.legion) genLegion()` fallback each resolve through the scope chain. (Reassigning
  // G.genLegion would NOT work — G is a separate capture object. Same lexical gotcha as the server's load-game.)
  // state.legion simply stays null until the server's roster lands (welcome, then snap.legion); renderLegion()
  // already draws a graceful "The Legion has not yet stirred." for that sliver, and nothing else here reads it
  // (updateQuests reads state.quests.legion — the QUEST — not the roster).
  window.genLegion = () => {};
  try { G.startGame(); } catch (e) { console.error('startGame', e); }
  if (G.fitCanvas) try { G.fitCanvas(); } catch (e) {}
  realWinAdd('resize', () => { if (G.fitCanvas) try { G.fitCanvas(); } catch (e) {} });

  // EXPLICIT adoption of the server's Dread Legion roster (the architecture's per-field rule: nothing on the wire
  // applies itself). Arrives on `welcome` — so [N] shows real members from the first frame, and a takeover, which
  // adopts the live pid's already-caught-up _lgSeen, still seeds the fresh page — and thereafter only when the
  // roster CHANGES (snap.legion, version-gated server-side by _lgN → 0 bytes/tick at rest). Re-render if the panel
  // happens to be OPEN so a "???" strength/weakness reveal lands live as you wound the real member.
  function adoptLegion(L) {
    if (!L) return;
    G.state.legion = L;
    if (G.state.scene === 'legion' && G.renderLegion) try { G.renderLegion(); } catch (e) { console.error('renderLegion', e); }
  }

  // The EVENT FEED and the QUEST STATE are the roster's siblings: EDGE-triggered payloads that ride exactly ONE
  // snapshot each (server-side `_feedSeen` vs `feedN`, `_qSeen` vs `_qN` — both consumed the instant they attach).
  // All three are adopted from `ws.onmessage` for the reason spelled out in its `state` branch. Keeping them as
  // named fns side by side is deliberate: these are the client's ENTIRE one-shot surface — anything added here
  // needs the same treatment, and anything reconciled in the frame loop instead is a silent coin flip.
  // Errors are throttled: onmessage is the ~66 Hz hot path, so an unthrottled console.error would flood the console.
  let lastEdgeErrT = 0;
  function edgeErr(what, e) {
    const t = performance.now();
    if (t - lastEdgeErrT > 2000) { lastEdgeErrT = t; console.error('mp ' + what + ' adopt error (payload skipped, socket continues):', e); }
  }

  // Server EVENT FEED → the game's bottom-left log (kills, drops, fishing, quests + other heroes' epic broadcasts).
  // MESSAGE ORDER holds for free: the socket delivers messages in send order, this runs synchronously inside the
  // onmessage for each one, and each snapshot's lines are appended in array order — so the log reads exactly as the
  // server wrote it. A dropped feed line is UNRECOVERABLE (the server already advanced _feedSeen past it), which is
  // precisely why this cannot live in the frame loop. It must also exist NOWHERE ELSE: a second call site would
  // double-log every line.
  function adoptFeed(F) {
    if (!F) return;
    for (const f of F) { try { G.log && G.log(f.m, f.c || 'good'); } catch (e) { edgeErr('feed', e); } }
  }

  // YOUR questline + bounty + Realm-stones + deepest depth → adopt, then re-render the quest box. Version-gated
  // by _qN server-side, so a dropped snapshot leaves the box STALE until the NEXT quest change — potentially a
  // game-hour of wrong information on screen, not a cosmetic one-frame blip. Fed by BOTH the `welcome` (join /
  // reconnect / takeover seed) and the gated snapshot block — same payload shape, one adopt path.
  function adoptQuests(s) {
    if (!s || !s.quests) return;
    try {
      // The bag MUST be adopted before the box paints. updateQuests hides "Find the Dungeon Key" on
      // `q.key.done || state.inventory.keys > 0` — and this runs in ws.onmessage, while state.inventory is
      // otherwise only assigned in the FRAME-loop reconcile. The first snapshot always carries quests
      // (_qSeen=0), and onmessage provably precedes the first frame, so the first paint read the game's
      // DEFAULT keys=0 bag and a 16-key hero was told to go find a key — and it stuck until _qN next moved.
      // (reconcile re-assigns this same object moments later — idempotent, not a second source of truth.)
      if (s.me && s.me.inventory) G.state.inventory = s.me.inventory;
      G.state.quests = s.quests;
      G.state.bounty = s.bounty || null;
      if (s.loreFound) G.state.loreFound = s.loreFound;
      if (s.maxDepth != null) G.state.maxDepth = s.maxDepth;
      window.updateQuests && window.updateQuests();
    } catch (e) { edgeErr('quests', e); }
  }

  // 6. connect to the authoritative server
  let snap = null, myId = null, mapReady = false, ws = null, mpLive = false, serverHz = 60;

  // ---- identity: "hero name + recovery code" (no passwords), persisted per browser ----
  // token   → the browser's saved secret; presenting it auto-restores the hero.
  // recovery→ a human code (shown once) to reclaim the hero on another device.
  const LS_TOKEN = 'eldermyr_token', LS_REC = 'eldermyr_recovery', LS_NAME = 'eldermyr_name', LS_PEND = 'eldermyr_pending_code', LS_SKIN = 'eldermyr_skin';
  const lsGet = (k) => { try { return localStorage.getItem(k) || ''; } catch (e) { return ''; } };
  const lsSet = (k, v) => { try { v ? localStorage.setItem(k, v) : localStorage.removeItem(k); } catch (e) {} };
  let myToken = lsGet(LS_TOKEN), myRecovery = lsGet(LS_REC), myName = lsGet(LS_NAME) || 'Hero', persistent = false;
  const pendingCode = lsGet(LS_PEND); if (pendingCode) lsSet(LS_PEND, '');   // a reclaim-by-code survives the reload here
  // what we present on (re)connect: a reclaim code if pending, else our token, else nothing (→ name entry)
  let authPayload = pendingCode ? { recoveryCode: pendingCode } : (myToken ? { token: myToken } : null);
  if (pendingCode) myRecovery = pendingCode;
  function sendAuth() { if (ws && ws.readyState === 1 && authPayload) { try { ws.send(JSON.stringify(Object.assign({ type: 'auth' }, authPayload))); } catch (e) {} } }

  // modal plumbing
  const modal = document.createElement('div'); modal.className = 'mp-modal'; document.body.appendChild(modal);
  const acctBtn = document.getElementById('mp-account');
  const esc = (s) => String(s == null ? '' : s).replace(/[<>&"]/g, (c) => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c]));
  function closeModal() { modal.classList.remove('on'); modal.innerHTML = ''; }
  function openModal(html) { modal.innerHTML = '<div class="mp-card">' + html + '</div>'; modal.classList.add('on'); const c = modal.querySelector('.mp-card'); c.querySelectorAll('input').forEach((i) => i.addEventListener('keydown', (e) => e.stopPropagation())); return c; }
  function updateAcctBtn() { if (!acctBtn) return; acctBtn.textContent = '◆ ' + myName + (persistent ? '' : ' ·'); acctBtn.style.display = 'block'; placeAccountBtn(); }
  // Pin the account chip just under the game's stats panel (#hud), tracking its
  // bottom edge so it never overlaps even as the HUD grows/shrinks with buffs.
  function placeAccountBtn() {
    if (!acctBtn || acctBtn.style.display === 'none') return;
    const h = document.getElementById('hud');
    if (!h) return;
    const b = h.getBoundingClientRect();
    if (b.height) { acctBtn.style.left = Math.round(b.left) + 'px'; acctBtn.style.top = Math.round(b.bottom + 6) + 'px'; }
  }
  function copyText(t, btn) {
    const done = () => { const o = btn.getAttribute('data-l') || btn.textContent; btn.setAttribute('data-l', o); btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = o; }, 1200); };
    try { navigator.clipboard.writeText(t).then(done, done); } catch (e) { try { const ta = document.createElement('textarea'); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); done(); } catch (_e) {} }
  }
  acctBtn && acctBtn.addEventListener('click', showAccount);

  function showNameEntry() {
    const c = openModal(
      '<h2>Welcome to Eldermyr</h2>' +
      '<p>Name your hero to begin. Progress saves automatically to this browser.</p>' +
      '<input id="mp-name-in" maxlength="18" placeholder="Hero name" autocomplete="off" spellcheck="false">' +
      '<button class="mp-btn primary" id="mp-name-go">Enter Eldermyr</button>' +
      '<div class="mp-mut" id="mp-have-code" style="cursor:pointer">▸ I already have a recovery code</div>');
    const inp = c.querySelector('#mp-name-in'); setTimeout(() => inp.focus(), 30);
    const go = () => { const nm = (inp.value || '').trim().slice(0, 18); if (!nm) { inp.focus(); return; } authPayload = { name: nm }; myName = nm; lsSet(LS_NAME, nm); closeModal(); if (ws && ws.readyState === 1) sendAuth(); else connect(); };   // fresh heroes connect HERE (no socket is opened pre-name — the server reaps unauthed sockets after 10s)
    c.querySelector('#mp-name-go').addEventListener('click', go);
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    c.querySelector('#mp-have-code').addEventListener('click', () => showReclaim(true));
  }

  function showRecovery(code) {
    const c = openModal(
      '<h2>Save your recovery code</h2>' +
      '<p>This is the only way to play this hero on another device or browser. Keep it somewhere safe — it won\'t be shown again.</p>' +
      '<div class="mp-code">' + esc(code) + '</div>' +
      '<div class="mp-row"><button class="mp-btn" id="mp-rec-copy">Copy</button><button class="mp-btn primary" id="mp-rec-ok">Got it</button></div>');
    c.querySelector('#mp-rec-copy').addEventListener('click', (e) => copyText(code, e.currentTarget));
    c.querySelector('#mp-rec-ok').addEventListener('click', closeModal);
  }

  function showReclaim(fromNameEntry) {
    const c = openModal(
      '<h2>Log in with a recovery code</h2>' +
      '<p>Enter a hero\'s recovery code to bring it to this device.</p>' +
      '<input id="mp-code-in" placeholder="WORD-XXXX-WORD-XXXX" autocomplete="off" spellcheck="false">' +
      '<button class="mp-btn primary" id="mp-code-go">Reclaim hero</button>' +
      '<button class="mp-btn" id="mp-code-cancel">Cancel</button>');
    const inp = c.querySelector('#mp-code-in'); setTimeout(() => inp.focus(), 30);
    const go = () => { const code = (inp.value || '').trim(); if (!code) { inp.focus(); return; } lsSet(LS_PEND, code); lsSet(LS_TOKEN, ''); location.reload(); };
    c.querySelector('#mp-code-go').addEventListener('click', go);
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    c.querySelector('#mp-code-cancel').addEventListener('click', () => (fromNameEntry ? showNameEntry() : showAccount()));
  }

  // ---- hero archetypes: 5 distinct characters, server-authoritative (drawPlayer reads p.skin) ----
  // draw each hero ARCHETYPE as a real sprite so players pick an avatar, not a color/label (#22)
  const AV_ARCH = [{ cape: '#4060c0', hair: '#6a4a2a' }, { cape: '#2e6b3f', hood: '#245232' }, { robe: '#6a3fa0', hat: '#4a2c78' }, { hair: '#241616', band: '#c03030', pauld: '#8a6a3a' }, { cape: '#3a4152', hair: '#1c1f2a', mask: '#2c3140', short: true }];
  function avatarDataURL(skin) {
    const S = 3, W = 22, H = 28, sx = 2, sy = 8;
    const cv = document.createElement('canvas'); cv.width = (W + 4) * S; cv.height = (H + 10) * S;
    const x = cv.getContext('2d'); x.scale(S, S); const AR = AV_ARCH[skin] || AV_ARCH[0], body = '#6b7086';
    x.fillStyle = 'rgba(0,0,0,0.25)'; x.beginPath(); x.ellipse(sx + W / 2, sy + H + 2, W / 2, 3, 0, 0, 6.28); x.fill();
    if (AR.cape) { const hemY = AR.short ? H - 10 : H - 4; x.fillStyle = AR.cape; x.beginPath(); x.moveTo(sx + 5, sy + 10); x.lineTo(sx + W - 5, sy + 10); x.lineTo(sx + W - 3, sy + hemY); x.lineTo(sx + 3, sy + hemY); x.closePath(); x.fill(); }
    x.fillStyle = '#2c3050'; x.fillRect(sx + 7, sy + H - 6, 4, 5); x.fillRect(sx + W - 11, sy + H - 6, 4, 5);
    x.fillStyle = body; x.fillRect(sx + 5, sy + 10, W - 10, H - 15);
    x.fillStyle = '#3a2c18'; x.fillRect(sx + 5, sy + 15, W - 10, 2);
    x.fillStyle = '#e8c090'; x.fillRect(sx + 6, sy, W - 12, 11);
    if (AR.hair) { x.fillStyle = AR.hair; x.fillRect(sx + 6, sy, W - 12, 4); x.fillRect(sx + 6, sy, 2, 7); }
    if (AR.hood) { x.fillStyle = AR.hood; x.fillRect(sx + 5, sy - 1, W - 10, 5); x.fillRect(sx + 5, sy + 2, 2, 8); x.fillRect(sx + W - 7, sy + 2, 2, 8); }
    if (AR.hat) { x.fillStyle = AR.hat; x.beginPath(); x.moveTo(sx + W / 2, sy - 8); x.lineTo(sx + W - 3, sy + 3); x.lineTo(sx + 3, sy + 3); x.closePath(); x.fill(); }

  function drawRift() {   // #14: a swirling portal — BLUE = party (co-op) rift, PURPLE = solo rift
    if (!snap || !snap.rift) return;
    const ctx = G.ctx, cam = G.state.camera; if (!ctx) return;
    const cx = snap.rift.x + 16 - cam.x, cy = snap.rift.y + 16 - cam.y;
    const t = performance.now() / 1000, party = snap.rift.party;

    ctx.fillStyle = party ? 'rgba(12,26,60,0.6)' : 'rgba(40,10,60,0.6)'; ctx.beginPath(); ctx.arc(cx, cy, 7, 0, 6.28); ctx.fill();

  }
  function drawPings() {
    const ctx = G.ctx; if (!ctx || !pings.length) return;
    const now = performance.now(), LIFE = 6000;
    for (let i = pings.length - 1; i >= 0; i--) if (now - pings[i].t > LIFE) pings.splice(i, 1);
    if (!pings.length) return;
    const { sw, sh } = viewSize(), cam = S.camera, me = S.player;
    for (const pg of pings) {
      const alpha = Math.max(0, 1 - (now - pg.t) / LIFE);
      const col = pg.kind === 'downed' ? '#ff5a5a' : (pg.kind === 'danger' ? '#ffcc40' : '#5ad1ff');
      const sx = pg.x - cam.x, sy = pg.y - cam.y;
      const onScreen = sx >= 6 && sx <= sw - 6 && sy >= 6 && sy <= sh - 6;

        const txt = (pg.kind === 'downed' ? '⚑ ' : '') + (pg.name || 'ping') + (pg.kind === 'downed' ? ' down!' : '');
        ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
        const tw = txt.length * 6 + 8; ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(sx - tw / 2, sy - 46, tw, 13);
        ctx.fillStyle = col; ctx.fillText(txt, sx, sy - 36); ctx.textAlign = 'left';
      } else {
        const m = 26, ex = Math.max(m, Math.min(sw - m, sx)), ey = Math.max(m, Math.min(sh - m, sy));
        const ang = Math.atan2(sy - sh / 2, sx - sw / 2);
        ctx.translate(ex, ey); ctx.rotate(ang);
        ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(11, 0); ctx.lineTo(-6, -6); ctx.lineTo(-6, 6); ctx.closePath(); ctx.fill();
        ctx.rotate(-ang);
        const dist = Math.round(Math.hypot(pg.x - (me.x + me.w / 2), pg.y - (me.y + me.h / 2)) / (G.TILE || 32));
        ctx.fillStyle = col; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center'; ctx.fillText((pg.name || 'ping') + ' ' + dist + 'm', 0, -11); ctx.textAlign = 'left';
      }
      ctx.restore();
    }
  }

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => { mpLive = true; st('● connected'); if (authPayload) sendAuth(); else showNameEntry(); };
    ws.onclose = () => { mpLive = false; if (superseded) { st('This hero is now playing in another window.'); return; } if (noReconnect) { st('○ away'); return; } st('○ reconnecting…'); setTimeout(connect, 1000); };
    ws.onerror = () => {};
    ws.onmessage = (ev) => {
      const m = JSON.parse(ev.data);
      if (m.type === 'welcome') {
        myId = m.id;
        serverHz = m.hz || 60;                           // sync prediction to the server's tick rate
        persistent = !!m.persistent;
        if (m.name) { myName = m.name; lsSet(LS_NAME, myName); }
        if (m.token) { myToken = m.token; lsSet(LS_TOKEN, myToken); authPayload = { token: myToken }; }   // auto-login on future (re)connects
        if (m.recoveryCode) { myRecovery = m.recoveryCode; lsSet(LS_REC, myRecovery); showRecovery(m.recoveryCode); }   // brand-new hero → show once
        else if (pendingCode) { lsSet(LS_REC, pendingCode); }   // reclaimed via a code the player typed → remember it here
        updateAcctBtn();
        { const _sk = parseInt(lsGet(LS_SKIN)); if (Number.isFinite(_sk)) { try { ws.send(JSON.stringify({ type: 'skin', skin: _sk })); } catch (_e) {} } }   // re-apply this browser's hero look
        G.maps.overworld = m.map.tiles;                  // adopt the server's world
        G.state.map = 'overworld';
        G.state.pois = []; G.state.shrines = []; G.state.loreStones = [];   // hide client-random features
        adoptLegion(m.legion);                           // …and the Dread Legion roster, the other shared-world feature we must never invent locally
        adoptQuests(m);                                  // …and THIS hero's questline. Required on a TAKEOVER (wifi blip / reload / second tab): that path adopts the live server-side player, whose _qSeen is already caught up, so no snapshot would ever re-send quests and this brand-new page would render the game's intro defaults forever. `m` already carries quests/bounty/loreFound/maxDepth (+ no `me`, so the bag line inside no-ops — the first snapshot, milliseconds later, does that half).
        try { G.buildMinimapBase && G.buildMinimapBase(); } catch (e) {}
        mapReady = true;
      } else if (m.type === 'state') {
        // Adopt the EDGE-TRIGGERED payloads HERE, not in reconcile: `snap` keeps only the NEWEST snapshot, and
        // reconcile runs in the FRAME loop — at 66 Hz broadcast vs a browser rendering slower (or a backgrounded
        // tab, where rAF throttles to ~1 Hz) most snapshots are overwritten before a frame ever sees them. Fields
        // that ride EVERY snapshot (me, enemies, pickups) don't care — the next one carries them again. These ride
        // exactly ONE snapshot each, so reconciling them was the naive one-shot ARCHITECTURE.md warns "WILL
        // eventually be lost":
        //   • legion — and it WAS lost: the live client sat on the stale boot roster (Lv 1) while the server had it
        //     at Lv 19, after passing every headless check (headless calls snapshotFor directly, never dropping one).
        //   • feed   — the server advances _feedSeen the moment it attaches, so a dropped line is gone FOREVER.
        //   • quests — a drop leaves the quest box STALE until the NEXT quest change.
        // onmessage observes EVERY message, so none of them can be dropped. Equally: these must run NOWHERE ELSE —
        // a leftover reconcile-side copy would double-log every feed line.
        if (m.snap) { adoptLegion(m.snap.legion); adoptFeed(m.snap.feed); adoptQuests(m.snap); }
        snap = m.snap;
      }
      else if (m.type === 'renamed') { myName = m.name; lsSet(LS_NAME, myName); updateAcctBtn(); closeModal(); }
      else if (m.type === 'shopData') {                  // server sent this hero's shop stock → open the panel
        const d = m.data; if (!d) return;
        G.state.activeStock = d.stock; G.state.activeShopName = d.name; G.state.activeShopTown = d.town;
        if (G.state.player) G.state.player.shopPurchased = d.purchased || [];   // P2/S7: player-carried — pre-seed the open so 'Owned' greys instantly (the next snapshot's `me` re-syncs it anyway)
        G.state.scene = 'shop';
        const el = document.getElementById('shop'); if (el) el.style.display = 'block';
        try { window.renderShop && window.renderShop(); } catch (_e) {}
        try { G.Sound && G.Sound.blip && G.Sound.blip(); } catch (_e) {}
      }
      else if (m.type === 'interactResult') {            // server resolved an [E] on an NPC
        const r = m.res; if (!r) return;
        if (r.kind === 'dialogue') openDialogueMP(r.speaker, r.lines);
        else if (r.kind === 'toast') { try { G.log && G.log(r.text, r.cls || 'quest'); } catch (_e) {} try { G.Sound && G.Sound.blip && G.Sound.blip(); } catch (_e) {} }
        else if (r.kind === 'panel') {
          if (r.panel === 'cook') openCookMP();
          else if (r.panel === 'hunts') { G.state.huntsSlain = r.huntsSlain || []; if (G.state.scene === 'hunts') { try { window.renderHunts && window.renderHunts(); } catch (_e) {} } else openHuntsMP(); }
          else if (r.panel === 'trophy') { G.state.pinnacleSlain = r.pinnacleSlain || []; G.state.uniquesFound = r.uniquesFound || []; if (G.state.scene === 'trophy') { try { window.renderTrophy && window.renderTrophy(); } catch (_e) {} } else openTrophyMP(); }   // adopt the SHARED pinnacle progress, then render the Trophy Wall (mirrors hunts)
          else if (r.panel === 'companions') { G.state.companions = r.companions || []; if (G.state.scene === 'companions') { try { window.renderCompanions && window.renderCompanions(); } catch (_e) {} } else openCompanionsMP(); }
        }
      }
      else if (m.type === 'idle-disconnect') { showAwayScreen(); }   // server dropped an idle tab; wait for a Resume click
      else if (m.type === 'superseded') { superseded = true; noReconnect = true; mpLive = false; st('This hero is now playing in another window.'); try { ws && ws.close(); } catch (_e) {} }   // a reconnect adopted this hero → stop reconnecting (would just get superseded again)
      else if (m.type === 'chat') { addChatLine(m.name, m.text); try { G.Sound && G.Sound.blip && G.Sound.blip(); } catch (_e) {} }
      else if (m.type === 'ping') { pings.push({ x: m.x, y: m.y, name: m.name, kind: m.kind, t: performance.now() }); if (pings.length > 16) pings.shift(); try { (m.kind === 'downed' ? (G.Sound && G.Sound.boss) : (G.Sound && G.Sound.blip)) && (m.kind === 'downed' ? G.Sound.boss() : G.Sound.blip()); } catch (_e) {} }
    };
  }
  // Returning heroes (token/reclaim code) connect right away — they auth the instant the socket

  // reap a socket idling unauthed while a human types, and the 1s auto-reconnect then re-rendered

  if (authPayload) connect(); else showNameEntry();

  // 7. input → server (held keys @20Hz + discrete actions)
  const held = {}; let actions = [];
  const KMAP = { w: 'w', a: 'a', s: 's', d: 'd', arrowup: 'w', arrowleft: 'a', arrowdown: 's', arrowright: 'd' };
  // browsers block audio until a gesture — resume on first key/click so sound
  // (and therefore mute) actually does something.

  realWinAdd('pointerdown', wake);
  function closePanel() {
    const sc = G.state.scene;
    try {
      if (sc === 'inventory') window.toggleInventory && window.toggleInventory();
      else if (sc === 'skills') window.toggleSkills && window.toggleSkills();
      else if (sc === 'shop') closeShopMP();
      else if (sc === 'smith') closeSmithMP();
      else if (sc === 'dialogue') closeDialogueMP();
      else if (sc === 'cook') closeCookMP();
      else if (sc === 'hunts') closeHuntsMP();
      else if (sc === 'trophy') closeTrophyMP();
      else if (sc === 'companions') closeCompanionsMP();
      else if (sc === 'map') { window.closeFullMap ? window.closeFullMap() : (function () { const el = document.getElementById('fullmap'); if (el) el.style.display = 'none'; G.state.scene = 'play'; })(); }   // [Esc] closes the enlarged map
      else if (sc !== 'play' && window.closeHubPanels) window.closeHubPanels();
    } catch (_e) {}
  }
  // Menu action buttons call these globals; override them to round-trip through the
  // server (local mutation would just be overwritten by the next snapshot).
  for (const fn of ['equipWeapon', 'equipArmor', 'sellAllJunk', 'drinkPotion', 'spendPoint', 'unlockAbility']) {
    if (typeof window[fn] === 'function') window[fn] = function () { actions.push({ rpc: fn, args: [].slice.call(arguments) }); };
  }
  // ---- Merchant shop (server-authoritative): open at a shop NPC, buy/sell via RPC ----
  function nearestShopNpc() {
    if (!snap || !snap.npcs || !snap.me) return null;
