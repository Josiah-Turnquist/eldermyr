<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Realms of Eldermyr — Multiplayer</title>
<style>
  #newgame-btn{display:none !important;}  /* no "new game" in a shared world; the status readout takes its spot */
  #mp-status{position:fixed;left:50%;transform:translateX(-50%);top:40px;z-index:99999;font:11px ui-monospace,Menlo,monospace;color:#9098a8;background:rgba(20,20,30,0.85);border:1px solid #5a5040;padding:4px 10px;border-radius:4px;text-shadow:1px 1px 0 #000;pointer-events:none}
  #mp-hurt{position:fixed;inset:0;z-index:99998;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center, transparent 42%, rgba(175,0,0,0.55) 100%)}
  /* --- account / identity UI --- */
  #mp-account{position:fixed;left:50%;transform:translateX(-50%);top:10px;z-index:99999;font:12px ui-monospace,Menlo,monospace;color:#e8d9a8;background:rgba(20,20,30,0.85);border:1px solid #5a5040;padding:5px 10px;border-radius:4px;cursor:pointer;text-shadow:1px 1px 0 #000;display:none;user-select:none;white-space:nowrap}
  #mp-account:hover{border-color:#c9a54e;color:#fff}
  .mp-modal{position:fixed;inset:0;z-index:100000;display:none;align-items:center;justify-content:center;background:rgba(6,6,10,0.72)}
  .mp-modal.on{display:flex}
  .mp-card{width:min(92vw,384px);max-height:88vh;overflow:auto;background:linear-gradient(#20202c,#171720);border:1px solid #5a5040;border-radius:8px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.6);font-family:ui-monospace,Menlo,monospace;color:#cdd2dc}
  .mp-card h2{margin:0 0 6px;font-size:17px;color:#e8d9a8;letter-spacing:0.5px}
  .mp-card p{margin:0 0 13px;font-size:12px;line-height:1.5;color:#9098a8}
  .mp-card input{width:100%;box-sizing:border-box;background:#0e0e16;border:1px solid #4a4438;color:#fff;font:14px ui-monospace,Menlo,monospace;padding:9px 10px;border-radius:4px;margin-bottom:10px;outline:none}
  .mp-card input:focus{border-color:#c9a54e}
  .mp-card input:disabled{color:#8a8f9a}
  .mp-btn{display:block;width:100%;box-sizing:border-box;background:#2b2b38;border:1px solid #5a5040;color:#e8d9a8;font:13px ui-monospace,Menlo,monospace;padding:9px 12px;border-radius:4px;cursor:pointer;text-align:center;margin-top:7px}
  .mp-btn:hover{border-color:#c9a54e;background:#34343f;color:#fff}
  .mp-btn.primary{background:#3a5a3a;border-color:#5c8c5c;color:#eaffea}
  .mp-btn.primary:hover{background:#456945}
  .mp-btn.danger:hover{border-color:#b05050;color:#ffb0b0}
  .mp-code{font-size:19px;letter-spacing:2px;color:#ffe08a;background:#0e0e16;border:1px dashed #6a5f3a;border-radius:5px;padding:12px;text-align:center;margin-bottom:6px;word-break:break-all}
  .mp-row{display:flex;gap:8px}
  .mp-row .mp-btn{margin-top:0}
  .mp-warn{font-size:11px;color:#e0a860;background:rgba(120,80,20,0.18);border:1px solid #6a5228;border-radius:4px;padding:7px 9px;margin-bottom:12px;line-height:1.45}
  .mp-mut{font-size:11px;color:#6b7080;margin-top:12px;text-align:center}
</style>
</head>
<body>
<div id="mp-hurt"></div>
<div id="mp-account"></div>
<div id="mp-status">loading Eldermyr…</div>
<script>
/* =============================================================================
 * Multiplayer client — the "load-and-render" fork.
 * Fetches the UNTOUCHED single-player game (eldermyr-rpg.html), boots it so all
 * its sprite/HUD/audio machinery initializes, stubs its simulation loop, then
 * drives its REAL renderer with authoritative snapshots from the server.
 * Nothing about eldermyr-rpg.html is copied or modified.
 * ========================================================================== */
const MP_PORT = 8138;
// Local dev: this page is on the 8137 dev server but the WS server is on 8138 → target it.
// Production: the server serves this page, so connect same-origin (wss on the service URL).
const WS_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname === '')
  ? 'ws://localhost:' + MP_PORT
  : (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host;
const st = (t) => { const e = document.getElementById('mp-status'); if (e) e.textContent = t; };

(async function boot() {
  // 1. fetch the untouched game
  let html;
  try { html = await (await fetch('/eldermyr-rpg.html')).text(); }
  catch (e) { st('failed to fetch game: ' + e); return; }
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // 2. adopt its <style>s and its <body> DOM (canvas + all HUD/overlay elements)
  for (const styleEl of doc.querySelectorAll('style')) document.head.appendChild(styleEl.cloneNode(true));
  const body = doc.body.cloneNode(true);
  const gameScriptEl = body.querySelector('script');
  const gameCode = gameScriptEl ? gameScriptEl.textContent : '';
  if (gameScriptEl) gameScriptEl.remove();               // don't let innerHTML carry an inert copy
  const frag = document.createDocumentFragment();
  while (body.firstChild) frag.appendChild(body.firstChild);
  document.body.insertBefore(frag, document.body.firstChild);

  // 3. keep the game from grabbing the keyboard (we route input to the server)
  //    and from ever running its own sim loop (stub rAF so its loop() can't recur).
  const realWinAdd = window.addEventListener.bind(window);
  window.addEventListener = (type, fn, opts) => { if (type === 'keydown' || type === 'keyup') return; return realWinAdd(type, fn, opts); };
  const realRAF = window.requestAnimationFrame.bind(window);
  window.requestAnimationFrame = () => 0;                // stays stubbed for the game forever

  // 4. run the game code + capture the symbols we need to render
  const NAMES = ['state', 'keys', 'maps', 'TILE', 'OW_W', 'OW_H', 'VIEW_W', 'VIEW_H', 'T', 'ctx', 'canvas',
    'fitCanvas', 'startGame', 'renderWorld', 'updateCamera', 'applyShake', 'drawWayfinder', 'updateMinimap',
    'updateHubTabs', 'updateCombatHud', 'updateHUD', 'buildMinimapBase', 'drawPlayer', 'Sound', 'canMoveTo',
    'floatDamage', 'spawnBurst', 'addShake', 'updateParticles'];
  const code = gameCode + '\n;window.__G={};' + NAMES.map((n) => `try{window.__G[${JSON.stringify(n)}]=${n}}catch(e){}`).join(';');
  const s = document.createElement('script'); s.textContent = code; document.body.appendChild(s);
  const G = window.__G;
  if (!G || !G.startGame) { st('game failed to load (no startGame)'); return; }

  // 5. boot the render machinery (builds a valid state, sprites, camera, HUD)
  window.addEventListener = realWinAdd;                  // restore for our own listeners
  try { G.startGame(); } catch (e) { console.error('startGame', e); }
  if (G.fitCanvas) try { G.fitCanvas(); } catch (e) {}
  realWinAdd('resize', () => { if (G.fitCanvas) try { G.fitCanvas(); } catch (e) {} });

  // 6. connect to the authoritative server
  let snap = null, myId = null, mapReady = false, ws = null, mpLive = false, serverHz = 60;

  // ---- identity: "hero name + recovery code" (no passwords), persisted per browser ----
  // token   → the browser's saved secret; presenting it auto-restores the hero.
  // recovery→ a human code (shown once) to reclaim the hero on another device.
  const LS_TOKEN = 'eldermyr_token', LS_REC = 'eldermyr_recovery', LS_NAME = 'eldermyr_name', LS_PEND = 'eldermyr_pending_code';
  const lsGet = (k) => { try { return localStorage.getItem(k) || ''; } catch (e) { return ''; } };
  const lsSet = (k, v) => { try { v ? localStorage.setItem(k, v) : localStorage.removeItem(k); } catch (e) {} };
  let myToken = lsGet(LS_TOKEN), myRecovery = lsGet(LS_REC), myName = lsGet(LS_NAME) || 'Hero', persistent = false;
  const pendingCode = lsGet(LS_PEND); if (pendingCode) lsSet(LS_PEND, '');   // a reclaim-by-code survives the reload here
  // what we present on (re)connect: a reclaim code if pending, else our token, else nothing (→ name entry)
  let authPayload = pendingCode ? { recoveryCode: pendingCode } : (myToken ? { token: myToken } : null);
  if (pendingCode) myRecovery = pendingCode;
  function sendAuth() { if (ws && ws.readyState === 1 && authPayload) { try { ws.send(JSON.stringify(Object.assign({ type: 'auth' }, authPayload))); } catch (e) {} } }

  // modal plumbing
  const modal = document.createElement('div'); modal.className = 'mp-modal'; document.body.appendChild(modal);
  const acctBtn = document.getElementById('mp-account');
  const esc = (s) => String(s == null ? '' : s).replace(/[<>&"]/g, (c) => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c]));
  function closeModal() { modal.classList.remove('on'); modal.innerHTML = ''; }
  function openModal(html) { modal.innerHTML = '<div class="mp-card">' + html + '</div>'; modal.classList.add('on'); const c = modal.querySelector('.mp-card'); c.querySelectorAll('input').forEach((i) => i.addEventListener('keydown', (e) => e.stopPropagation())); return c; }
  function updateAcctBtn() { if (!acctBtn) return; acctBtn.textContent = '◆ ' + myName + (persistent ? '' : ' ·'); acctBtn.style.display = 'block'; }
  function copyText(t, btn) {
    const done = () => { const o = btn.getAttribute('data-l') || btn.textContent; btn.setAttribute('data-l', o); btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = o; }, 1200); };
    try { navigator.clipboard.writeText(t).then(done, done); } catch (e) { try { const ta = document.createElement('textarea'); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); done(); } catch (_e) {} }
  }
  acctBtn && acctBtn.addEventListener('click', showAccount);

  function showNameEntry() {
    const c = openModal(
      '<h2>Welcome to Eldermyr</h2>' +
      '<p>Name your hero to begin. Progress saves automatically to this browser.</p>' +
      '<input id="mp-name-in" maxlength="18" placeholder="Hero name" autocomplete="off" spellcheck="false">' +
      '<button class="mp-btn primary" id="mp-name-go">Enter Eldermyr</button>' +
      '<div class="mp-mut" id="mp-have-code" style="cursor:pointer">▸ I already have a recovery code</div>');
    const inp = c.querySelector('#mp-name-in'); setTimeout(() => inp.focus(), 30);
    const go = () => { const nm = (inp.value || '').trim().slice(0, 18); if (!nm) { inp.focus(); return; } authPayload = { name: nm }; myName = nm; lsSet(LS_NAME, nm); closeModal(); sendAuth(); };
    c.querySelector('#mp-name-go').addEventListener('click', go);
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    c.querySelector('#mp-have-code').addEventListener('click', () => showReclaim(true));
  }

  function showRecovery(code) {
    const c = openModal(
      '<h2>Save your recovery code</h2>' +
      '<p>This is the only way to play this hero on another device or browser. Keep it somewhere safe — it won\'t be shown again.</p>' +
      '<div class="mp-code">' + esc(code) + '</div>' +
      '<div class="mp-row"><button class="mp-btn" id="mp-rec-copy">Copy</button><button class="mp-btn primary" id="mp-rec-ok">Got it</button></div>');
    c.querySelector('#mp-rec-copy').addEventListener('click', (e) => copyText(code, e.currentTarget));
    c.querySelector('#mp-rec-ok').addEventListener('click', closeModal);
  }

  function showReclaim(fromNameEntry) {
    const c = openModal(
      '<h2>Log in with a recovery code</h2>' +
      '<p>Enter a hero\'s recovery code to bring it to this device.</p>' +
      '<input id="mp-code-in" placeholder="WORD-XXXX-WORD-XXXX" autocomplete="off" spellcheck="false">' +
      '<button class="mp-btn primary" id="mp-code-go">Reclaim hero</button>' +
      '<button class="mp-btn" id="mp-code-cancel">Cancel</button>');
    const inp = c.querySelector('#mp-code-in'); setTimeout(() => inp.focus(), 30);
    const go = () => { const code = (inp.value || '').trim(); if (!code) { inp.focus(); return; } lsSet(LS_PEND, code); lsSet(LS_TOKEN, ''); location.reload(); };
    c.querySelector('#mp-code-go').addEventListener('click', go);
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    c.querySelector('#mp-code-cancel').addEventListener('click', () => (fromNameEntry ? showNameEntry() : showAccount()));
  }

  function showAccount() {
    if (!myId) return;   // not spawned yet
    const recHtml = myRecovery
      ? '<p style="margin-bottom:6px">Recovery code — use it to play this hero on another device:</p><div class="mp-code">' + esc(myRecovery) + '</div><button class="mp-btn" id="mp-acct-copy">Copy code</button>'
      : '<p>No recovery code is saved on this device.</p>';
    const warn = persistent ? '' : '<div class="mp-warn">⚠ Saves are OFF — no database is linked yet, so this hero won\'t persist. Progress and recovery codes activate once a database is connected.</div>';
    const c = openModal(
      '<h2>Your Hero</h2>' + warn +
      '<p style="margin-bottom:6px">Name:</p>' +
      '<input id="mp-acct-name" maxlength="18" value="' + esc(myName) + '"' + (persistent ? '' : ' disabled') + '>' +
      (persistent ? '<button class="mp-btn" id="mp-acct-rename">Save name</button>' : '') +
      '<div style="height:12px"></div>' + recHtml +
      '<div style="height:12px"></div>' +
      '<button class="mp-btn" id="mp-acct-login">Log in with a different code</button>' +
      '<button class="mp-btn danger" id="mp-acct-new">Start a new hero</button>' +
      '<button class="mp-btn primary" id="mp-acct-close">Close</button>');
    c.querySelector('#mp-acct-close').addEventListener('click', closeModal);
    const cp = c.querySelector('#mp-acct-copy'); cp && cp.addEventListener('click', (e) => copyText(myRecovery, e.currentTarget));
    const rn = c.querySelector('#mp-acct-rename'); rn && rn.addEventListener('click', () => { const nm = (c.querySelector('#mp-acct-name').value || '').trim().slice(0, 18); if (nm && ws && ws.readyState === 1) { try { ws.send(JSON.stringify({ type: 'rename', name: nm })); } catch (e) {} } });
    c.querySelector('#mp-acct-login').addEventListener('click', () => showReclaim(false));
    c.querySelector('#mp-acct-new').addEventListener('click', () => {
      const c2 = openModal('<h2>Start a new hero?</h2><p>Your current hero stays saved — return to it any time with its recovery code. Make sure you\'ve copied that code first.</p><button class="mp-btn danger" id="mp-new-yes">Yes, start fresh</button><button class="mp-btn primary" id="mp-new-no">Cancel</button>');
      c2.querySelector('#mp-new-yes').addEventListener('click', () => { lsSet(LS_TOKEN, ''); lsSet(LS_REC, ''); lsSet(LS_NAME, ''); location.reload(); });
      c2.querySelector('#mp-new-no').addEventListener('click', showAccount);
    });
  }

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => { mpLive = true; st('● connected'); if (authPayload) sendAuth(); else showNameEntry(); };
    ws.onclose = () => { mpLive = false; st('○ reconnecting…'); setTimeout(connect, 1000); };
    ws.onerror = () => {};
    ws.onmessage = (ev) => {
      const m = JSON.parse(ev.data);
      if (m.type === 'welcome') {
        myId = m.id;
        serverHz = m.hz || 60;                           // sync prediction to the server's tick rate
        persistent = !!m.persistent;
        if (m.name) { myName = m.name; lsSet(LS_NAME, myName); }
        if (m.token) { myToken = m.token; lsSet(LS_TOKEN, myToken); authPayload = { token: myToken }; }   // auto-login on future (re)connects
        if (m.recoveryCode) { myRecovery = m.recoveryCode; lsSet(LS_REC, myRecovery); showRecovery(m.recoveryCode); }   // brand-new hero → show once
        else if (pendingCode) { lsSet(LS_REC, pendingCode); }   // reclaimed via a code the player typed → remember it here
        updateAcctBtn();
        G.maps.overworld = m.map.tiles;                  // adopt the server's world
        G.state.map = 'overworld';
        G.state.pois = []; G.state.shrines = []; G.state.loreStones = [];   // hide client-random features
        try { G.buildMinimapBase && G.buildMinimapBase(); } catch (e) {}
        mapReady = true;
      } else if (m.type === 'state') { snap = m.snap; }
      else if (m.type === 'renamed') { myName = m.name; lsSet(LS_NAME, myName); updateAcctBtn(); closeModal(); }
    };
  }
  connect();

  // 7. input → server (held keys @20Hz + discrete actions)
  const held = {}; let actions = [];
  const KMAP = { w: 'w', a: 'a', s: 's', d: 'd', arrowup: 'w', arrowleft: 'a', arrowdown: 's', arrowright: 'd' };
  // browsers block audio until a gesture — resume on first key/click so sound
  // (and therefore mute) actually does something.
  const wake = () => { if (G.Sound && G.Sound.resume) try { G.Sound.resume(); } catch (_e) {} };
  realWinAdd('pointerdown', wake);
  function closePanel() {
    const sc = G.state.scene;
    try {
      if (sc === 'inventory') window.toggleInventory && window.toggleInventory();
      else if (sc === 'skills') window.toggleSkills && window.toggleSkills();
      else if (sc !== 'play' && window.closeHubPanels) window.closeHubPanels();
    } catch (_e) {}
  }
  // Menu action buttons call these globals; override them to round-trip through the
  // server (local mutation would just be overwritten by the next snapshot).
  for (const fn of ['equipWeapon', 'equipArmor', 'sellItem', 'sellAllJunk', 'drinkPotion', 'spendPoint']) {
    if (typeof window[fn] === 'function') window[fn] = function () { actions.push({ rpc: fn, args: [].slice.call(arguments) }); };
  }
  realWinAdd('keydown', (e) => {
    const k = e.key.toLowerCase();
    wake();
    if (modal.classList.contains('on')) return;    // an account/identity modal is up — keys belong to it, not the game
    // meta + menu keys (any scene)
    if (k === 'm') { if (G.Sound && G.Sound.toggleMute) try { G.Sound.toggleMute(); } catch (_e) {} return; }
    if (k === 'h') { const c = document.getElementById('controls'); if (c) c.style.display = (c.style.display === 'block' ? 'none' : 'block'); return; }
    if (k === 'i') { try { window.toggleInventory && window.toggleInventory(); } catch (_e) {} e.preventDefault(); return; }
    if (k === 'k') { try { window.toggleSkills && window.toggleSkills(); } catch (_e) {} e.preventDefault(); return; }
    if (k === 'escape') { closePanel(); return; }
    // gameplay keys only while actually playing (menu open = no walking/fighting)
    if (G.state.scene !== 'play') return;
    if (KMAP[k]) { held[KMAP[k]] = true; e.preventDefault(); }
    if (k === ' ' || k === 'j') { held._atk = true; e.preventDefault(); }
    if (k === 'e') actions.push('interact');
    if (k === 'shift' || k === 'l') actions.push('dodge');
    // abilities / potion / mount → server RPCs (applied to this player)
    if (k === 'q') actions.push({ rpc: 'useWhirlwind', args: [] });
    if (k === 'r') actions.push({ rpc: 'useFocus', args: [] });
    if (k === 'f') actions.push({ rpc: 'castSpell', args: [] });
    if (k === 'z') actions.push({ rpc: 'useUltimate', args: [] });
    if (k === 'x') actions.push({ rpc: 'useSummon', args: [] });
    if (k === '1') actions.push({ rpc: 'drinkPotion', args: [] });
    if (k === 'g') actions.push({ rpc: 'toggleMount', args: [] });
    if (k === 'b') actions.push({ rpc: 'toggleBoat', args: [] });
    if (k === 'c') actions.push({ rpc: 'doCamp', args: [] });
  });
  realWinAdd('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (KMAP[k]) held[KMAP[k]] = false;
    if (k === ' ' || k === 'j') held._atk = false;
  });
  setInterval(() => {
    if (!ws || ws.readyState !== 1) return;
    const inMenu = G.state && G.state.scene !== 'play';   // don't walk/fight while a panel is open
    const h = inMenu ? {} : { w: !!held.w, a: !!held.a, s: !!held.s, d: !!held.d };
    const act = actions; actions = [];                    // always flush queued RPCs (even from menus)
    if (!inMenu && held._atk) act.push('attack');
    ws.send(JSON.stringify({ type: 'input', held: h, actions: act }));
  }, 16);   // ~60Hz input to match the server tick (snappy start/stop/turns)

  // 8. render loop — feed the game's renderer server state, then draw other players
  const S = G.state;
  // client-side prediction for MY player: move locally on input so it feels
  // instant, and reconcile toward the server's authoritative position.
  const pred = { x: 0, y: 0 }; let predInit = false, lastSnap = null, lastMoveT = 0;
  // combat feedback regenerated from snapshot deltas (server has no client juice)
  let feelHp = null, feelLvl = null, feelGold = null, hurtFx = 0, panelSig = ''; const enemyMem = new Map();
  // client-side smoothing: remote entities only get new positions at the snapshot rate
  // (and unevenly over the wire); glide each toward its latest server position so a
  // 120fps display doesn't see them step/jitter. (My own player is already predicted.)
  const smooth = new Map(); let lastSmoothT = 0;
  function drawOthers(others) {
    const ctx = G.ctx; if (!ctx) return;
    const meRef = S.player;
    for (const op of others) {
      S.player = Object.assign({ invuln: 0, moving: false, animFrame: 0, dodge: 0, chillT: 0, w: meRef.w, h: meRef.h, dir: 'down' }, op);
      try { G.drawPlayer(); } catch (e) {}
      const sx = op.x - S.camera.x + op.w / 2, sy = op.y - S.camera.y - 16;
      ctx.font = '9px monospace'; ctx.textAlign = 'center';
      const label = (op.name || '?') + ' L' + op.level, nw = label.length * 5.6 + 8;
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(sx - nw / 2, sy - 9, nw, 11);
      ctx.fillStyle = '#9fe0ff'; ctx.fillText(label, sx, sy);
      ctx.fillStyle = '#000'; ctx.fillRect(sx - 13, sy + 2, 26, 3);
      ctx.fillStyle = '#66cc66'; ctx.fillRect(sx - 13, sy + 2, 26 * Math.max(0, op.hp / op.maxHp), 3);
      ctx.textAlign = 'left';
    }
    S.player = meRef;
  }
  let _fpsN = 0, _fpsT = 0;
  function frame() {
    realRAF(frame);
    _fpsN++; const _now = performance.now(); if (_now - _fpsT >= 1000) { window.__mpFps = _fpsN; _fpsN = 0; _fpsT = _now; st((mpLive ? '● live · ' : '○ ') + window.__mpFps + ' fps' + (snap ? ' · ' + snap.enemies.length + ' foes' : '')); }
    // self-heal the canvas size: in some browsers innerWidth is 0 at boot (layout
    // not settled), which zeroes fitCanvas. Re-fit once the viewport is real.
    if (G.canvas && !G.canvas.width && window.innerWidth > 0 && G.fitCanvas) { try { G.fitCanvas(); } catch (e) {} }
    if (!snap || !mapReady || !snap.me) return;
    // --- reconcile prediction against the newest authoritative snapshot ---
    if (snap !== lastSnap) {
      lastSnap = snap;
      if (!predInit) { pred.x = snap.me.x; pred.y = snap.me.y; predInit = true; }
      else {
        const err = Math.hypot(snap.me.x - pred.x, snap.me.y - pred.y);
        if (err > 64) { pred.x = snap.me.x; pred.y = snap.me.y; }        // big correction: knockback/teleport/collision
        else { pred.x += (snap.me.x - pred.x) * 0.25; pred.y += (snap.me.y - pred.y) * 0.25; }  // smooth drift correction
      }
      // ---- combat feedback (replay the game's own juice from deltas) ----
      const me2 = snap.me;
      if (feelHp !== null) {
        if (me2.hp < feelHp - 0.5) {                                    // took damage
          hurtFx = 1;
          try { G.addShake && G.addShake(5); } catch (_e) {}
          try { G.Sound && G.Sound.hurt && G.Sound.hurt(); } catch (_e) {}
          try { G.floatDamage && G.floatDamage(pred.x + me2.w / 2, pred.y, Math.round(feelHp - me2.hp), '#ff6060'); } catch (_e) {}
        } else if (me2.hp > feelHp + 0.5) {                             // healed
          try { G.floatDamage && G.floatDamage(pred.x + me2.w / 2, pred.y, '+' + Math.round(me2.hp - feelHp), '#60e060'); } catch (_e) {}
        }
      }
      feelHp = me2.hp;
      if (feelLvl !== null && me2.level > feelLvl) {
        try { G.Sound && G.Sound.levelup && G.Sound.levelup(); } catch (_e) {}
        try { G.spawnBurst && G.spawnBurst(pred.x + me2.w / 2, pred.y + me2.h / 2, 22, { color: '#90ff90', speed: 2.8, decay: 0.03 }); } catch (_e) {}
      }
      feelLvl = me2.level;
      if (feelGold !== null && me2.gold > feelGold) { try { G.Sound && G.Sound.gold && G.Sound.gold(); } catch (_e) {} }
      feelGold = me2.gold;
      // enemy hits + deaths via stable _nid
      const seen = new Set();
      for (const en of (snap.enemies || [])) {
        if (en._nid == null) continue;
        seen.add(en._nid);
        const prev = enemyMem.get(en._nid);
        if (prev && en.hp < prev.hp - 0.5) {
          try { G.floatDamage && G.floatDamage(en.x + en.w / 2, en.y, Math.round(prev.hp - en.hp), '#fff060'); } catch (_e) {}
          try { G.Sound && G.Sound.hit && G.Sound.hit(); } catch (_e) {}
        }
        enemyMem.set(en._nid, { hp: en.hp, mhp: en.maxHp, x: en.x, y: en.y, w: en.w, h: en.h });
      }
      for (const [nid, prev] of enemyMem) {
        if (seen.has(nid)) continue;
        if (prev.hp <= (prev.mhp || 999) * 0.34) {                      // was dying → vanish = kill
          try { G.spawnBurst && G.spawnBurst(prev.x + prev.w / 2, prev.y + prev.h / 2, 12, { color: '#c04040', speed: 2.4, decay: 0.04 }); } catch (_e) {}
          try { G.Sound && G.Sound.enemyDie && G.Sound.enemyDie(); } catch (_e) {}
        }
        enemyMem.delete(nid);
      }
      // --- record smoothing targets for remote entities (enemies, projectiles, other players) ---
      const _live = new Set();
      for (const en of (snap.enemies || [])) if (en._nid != null) { const k = 'e' + en._nid; const s = smooth.get(k); if (s) { s.tx = en.x; s.ty = en.y; } else smooth.set(k, { tx: en.x, ty: en.y, rx: en.x, ry: en.y }); _live.add(k); }
      for (const pr of (snap.proj || [])) if (pr._pid != null) { const k = 'r' + pr._pid; const s = smooth.get(k); if (s) { s.tx = pr.x; s.ty = pr.y; } else smooth.set(k, { tx: pr.x, ty: pr.y, rx: pr.x, ry: pr.y }); _live.add(k); }
      for (const pl of (snap.players || [])) { if (pl.id === myId) continue; const k = 'u' + pl.id; const s = smooth.get(k); if (s) { s.tx = pl.x; s.ty = pl.y; } else smooth.set(k, { tx: pl.x, ty: pl.y, rx: pl.x, ry: pl.y }); _live.add(k); }
      for (const k of smooth.keys()) if (!_live.has(k)) smooth.delete(k);
    }
    // --- dead-reckon my movement each frame (input feels instant) ---
    const now = performance.now(), dt = Math.min(120, now - (lastMoveT || now)); lastMoveT = now;  // cap high enough that low fps doesn't slow movement
    let dx = (held.d ? 1 : 0) - (held.a ? 1 : 0), dy = (held.s ? 1 : 0) - (held.w ? 1 : 0);
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
    if ((dx || dy) && predInit && G.state.scene === 'play') {
      const spd = (snap.me.speed || 2) * (snap.me.chillT > 0 ? 0.55 : 1) * (dt / (1000 / serverHz));
      const w = snap.me.w, h = snap.me.h, nx = pred.x + dx * spd, ny = pred.y + dy * spd;
      if (!G.canMoveTo || G.canMoveTo(nx, pred.y, w, h)) pred.x = nx;
      if (!G.canMoveTo || G.canMoveTo(pred.x, ny, w, h)) pred.y = ny;
    }
    // adopt authoritative state, but render MY player at the predicted position
    S.player = snap.me;
    S.player.x = pred.x; S.player.y = pred.y;
    if (snap.me.inventory) S.inventory = snap.me.inventory;
    S.enemies = snap.enemies || [];
    S.pickups = snap.pickups || [];
    S.projectiles = snap.proj || [];
    S.npcs = snap.npcs || [];
    S.time = snap.t; S.weather = snap.wx;
    const others = (snap.players || []).filter((p) => p.id !== myId);
    // --- glide remote entities toward their latest server position (kills stepping/jitter) ---
    { const _sn = performance.now(), _sdt = Math.min(100, _sn - (lastSmoothT || _sn)); lastSmoothT = _sn;
      const _sk = Math.min(1, _sdt / 55), _skp = Math.min(1, _sdt / 26);   // projectiles snap faster (less lag)
      for (const e of S.enemies) { const s = smooth.get('e' + e._nid); if (s) { s.rx += (s.tx - s.rx) * _sk; s.ry += (s.ty - s.ry) * _sk; e.x = s.rx; e.y = s.ry; } }
      for (const pr of S.projectiles) { const s = smooth.get('r' + pr._pid); if (s) { s.rx += (s.tx - s.rx) * _skp; s.ry += (s.ty - s.ry) * _skp; pr.x = s.rx; pr.y = s.ry; } }
      for (const op of others) { const s = smooth.get('u' + op.id); if (s) { s.rx += (s.tx - s.rx) * _sk; s.ry += (s.ty - s.ry) * _sk; op.x = s.rx; op.y = s.ry; } }
    }
    // keep an open inventory/skills panel fresh after server-applied changes
    if (G.state.scene === 'inventory' || G.state.scene === 'skills') {
      const sig = (snap.me.inventory ? JSON.stringify(snap.me.inventory) : '') + '|' + snap.me.skillPoints + '|' + snap.me.gold + '|' + snap.me.level;
      if (sig !== panelSig) { panelSig = sig; try { if (G.state.scene === 'inventory') { window.renderInventory && window.renderInventory(); } else { window.renderSkills && window.renderSkills(); } } catch (_e) {} }
    } else if (panelSig) panelSig = '';
    try {
      if (G.updateParticles) G.updateParticles();      // animate/decay juice bursts we spawned
      G.updateCamera(); G.applyShake(); G.renderWorld();
      drawOthers(others);
      G.drawWayfinder && G.drawWayfinder();
      G.updateMinimap && G.updateMinimap();
      G.updateHubTabs && G.updateHubTabs();
      G.updateCombatHud && G.updateCombatHud();
      G.updateHUD && G.updateHUD();
    } catch (e) { st('render error: ' + e.message); console.error(e); }
    if (hurtFx > 0.001) { hurtFx = Math.max(0, hurtFx - 0.06); const hv = document.getElementById('mp-hurt'); if (hv) hv.style.opacity = hurtFx.toFixed(2); }
  }
  realRAF(frame);
  st('● booted — waiting for world…');
})();
</script>
